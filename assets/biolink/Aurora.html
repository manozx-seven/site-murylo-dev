<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio | Aurora Profunda</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Lexend (Geométrica, moderna e ultra legível) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-polar: #030712; /* Gray 950 - Escuro total */
            --aurora-cyan: #00f5d4;
            --aurora-emerald: #10b981;
            --aurora-violet: #7b2cbf;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-glow: rgba(0, 245, 212, 0.15);
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg-polar);
            color: #f3f4f6;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .aurora-sky {
            position: fixed;
            inset: 0;
            z-index: -2;
            overflow: hidden;
            background: var(--bg-polar);
        }

        .aurora-ribbon {
            position: absolute;
            filter: blur(70px);
            opacity: 0.6;
            mix-blend-mode: screen;
            border-radius: 50%;
        }

        .ribbon-1 {
            top: 10%;
            left: -20%;
            width: 140vw;
            height: 30vh;
            background: linear-gradient(90deg, transparent, var(--aurora-emerald), var(--aurora-cyan), transparent);
            transform: rotate(-15deg);
            animation: wave-ribbon 18s infinite alternate ease-in-out;
        }

        .ribbon-2 {
            bottom: 15%;
            right: -30%;
            width: 150vw;
            height: 40vh;
            background: linear-gradient(90deg, transparent, var(--aurora-violet), var(--aurora-emerald), transparent);
            transform: rotate(10deg);
            animation: wave-ribbon 22s infinite alternate-reverse ease-in-out;
        }

        @keyframes wave-ribbon {
            0% { transform: rotate(-15deg) translateY(0) scaleY(1); opacity: 0.4; }
            50% { transform: rotate(-10deg) translateY(-30px) scaleY(1.3); opacity: 0.7; }
            100% { transform: rotate(-20deg) translateY(20px) scaleY(0.9); opacity: 0.5; }
        }

        /* Canvas de Poeira Mágica */
        #magic-dust {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .avatar-glow {
            position: relative;
            z-index: 1;
        }

        .avatar-glow::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--aurora-cyan), var(--aurora-violet), var(--aurora-emerald), var(--aurora-cyan));
            z-index: -1;
            filter: blur(15px);
            opacity: 0.7;
            animation: spin-glow 10s linear infinite;
        }

        @keyframes spin-glow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .text-shimmer {
            background: linear-gradient(90deg, #fff, var(--aurora-cyan), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .frosted-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .frosted-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .frosted-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(0, 245, 212, 0.4);
            box-shadow: 0 12px 40px -10px rgba(0, 245, 212, 0.2), 0 0 20px rgba(123, 44, 191, 0.1);
        }

        .frosted-card:hover::before {
            opacity: 1;
        }

        .frosted-card .icon-box {
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }

        .frosted-card:hover .icon-box {
            background: var(--aurora-cyan);
            color: var(--bg-polar);
            box-shadow: 0 0 15px var(--aurora-cyan);
            border-radius: 12px;
        }

        .frosted-card .card-label {
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .frosted-card:hover .card-label {
            transform: translateX(6px);
            color: #fff;
        }

        .mini-glass-item {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .mini-glass-item:hover {
            background: rgba(123, 44, 191, 0.15);
            border-color: var(--aurora-violet);
            box-shadow: inset 0 0 15px rgba(123, 44, 191, 0.2);
            transform: translateY(-4px);
        }

        .mini-glass-item:hover i {
            color: #d8b4fe;
            filter: drop-shadow(0 0 8px #d8b4fe);
        }

        /* Staggered Fade In Animation */
        .reveal-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal-up.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body class="flex flex-col items-center py-12 px-4 sm:px-6 lg:px-8">

    <!-- Fundo Aurora e Poeira Mágica -->
    <div class="aurora-sky">
        <div class="aurora-ribbon ribbon-1"></div>
        <div class="aurora-ribbon ribbon-2"></div>
    </div>
    <canvas id="magic-dust"></canvas>

    <main class="w-full max-w-md z-10 flex flex-col items-stretch">
        
        <!-- Cabeçalho / Perfil -->
        <header class="flex flex-col items-center text-center mb-10 reveal-up">
            <div class="avatar-glow mb-6">
                <img id="pm-avatar" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?ixlib=rb-4.0.3&auto=format&fit=crop&w=256&q=80" 
                     alt="Foto de Perfil" 
                     class="w-28 h-28 rounded-full object-cover border-2 border-[rgba(255,255,255,0.8)] relative z-10">
            </div>
            
            <h1 id="pm-nome" class="text-3xl sm:text-4xl font-bold tracking-tight text-shimmer mb-1">
                Lumière Escura
            </h1>
            <p id="pm-subtitulo" class="text-[13px] font-medium text-[#00f5d4] mb-4 tracking-widest uppercase opacity-90">
                Caçadora de Auroras
            </p>
            <p id="pm-bio" class="text-gray-400 text-sm max-w-[280px] font-light leading-relaxed">
                Fotografia noturna, expedições árticas e a magia das luzes celestiais. 🌌
            </p>
        </header>

        <!-- 4 Links Principais -->
        <div class="w-full flex flex-col gap-4 mb-8">
            
            <a id="pm-link-0" href="#" class="frosted-card flex items-center p-3 reveal-up group">
                <div class="icon-box w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 text-white ml-1">
                    <i id="pm-link-0-icon" data-lucide="image" class="w-5 h-5"></i>
                </div>
                <span id="pm-link-0-texto" class="card-label flex-grow text-center font-semibold text-[15px] text-gray-200 pr-14">Portfólio Fine Art</span>
            </a>

            <a id="pm-link-1" href="#" class="frosted-card flex items-center p-3 reveal-up group">
                <div class="icon-box w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 text-white ml-1">
                    <i id="pm-link-1-icon" data-lucide="camera" class="w-5 h-5"></i>
                </div>
                <span id="pm-link-1-texto" class="card-label flex-grow text-center font-semibold text-[15px] text-gray-200 pr-14">Presets Lightroom Night</span>
            </a>

            <a id="pm-link-2" href="#" class="frosted-card flex items-center p-3 reveal-up group">
                <div class="icon-box w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 text-white ml-1">
                    <i id="pm-link-2-icon" data-lucide="map-pin" class="w-5 h-5"></i>
                </div>
                <span id="pm-link-2-texto" class="card-label flex-grow text-center font-semibold text-[15px] text-gray-200 pr-14">Workshops na Islândia</span>
            </a>

            <a id="pm-link-3" href="#" class="frosted-card flex items-center p-3 reveal-up group">
                <div class="icon-box w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 text-white ml-1">
                    <i id="pm-link-3-icon" data-lucide="video" class="w-5 h-5"></i>
                </div>
                <span id="pm-link-3-texto" class="card-label flex-grow text-center font-semibold text-[15px] text-gray-200 pr-14">YouTube: Vlogs de Neve</span>
            </a>

        </div>

        <!-- 3 Ícones Rápidos (Mini Grid) -->
        <div class="grid grid-cols-3 gap-3 w-full mb-10">
            <a id="pm-mini-0" href="#" class="mini-glass-item flex flex-col items-center justify-center py-5 px-2 text-gray-400 reveal-up">
                <i id="pm-mini-0-icon" data-lucide="compass" class="w-6 h-6 mb-2 transition-all"></i>
                <span id="pm-mini-0-texto" class="text-[10px] font-bold tracking-widest uppercase text-gray-300">Guia</span>
            </a>
            
            <a id="pm-mini-1" href="#" class="mini-glass-item flex flex-col items-center justify-center py-5 px-2 text-gray-400 reveal-up">
                <i id="pm-mini-1-icon" data-lucide="backpack" class="w-6 h-6 mb-2 transition-all"></i>
                <span id="pm-mini-1-texto" class="text-[10px] font-bold tracking-widest uppercase text-gray-300">Gear</span>
            </a>
            
            <a id="pm-mini-2" href="#" class="mini-glass-item flex flex-col items-center justify-center py-5 px-2 text-gray-400 reveal-up">
                <i id="pm-mini-2-icon" data-lucide="coffee" class="w-6 h-6 mb-2 transition-all"></i>
                <span id="pm-mini-2-texto" class="text-[10px] font-bold tracking-widest uppercase text-gray-300">Apoiar</span>
            </a>
        </div>

        <!-- Rodapé / Social -->
        <footer class="flex gap-8 reveal-up w-full justify-center mt-2 pb-8">
            <a href="#" class="text-gray-500 hover:text-[#00f5d4] hover:-translate-y-1 transition-all duration-300" aria-label="Instagram">
                <i data-lucide="instagram" class="w-5 h-5"></i>
            </a>
            <a href="#" class="text-gray-500 hover:text-white hover:-translate-y-1 transition-all duration-300" aria-label="TikTok">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
            </a>
            <a href="#" class="text-gray-500 hover:text-[#7b2cbf] hover:-translate-y-1 transition-all duration-300" aria-label="Mail">
                <i data-lucide="mail" class="w-5 h-5"></i>
            </a>
        </footer>
        
    </main>

    <script>
        // Inicializa ícones
        lucide.createIcons();

        // Listener postMessage para edição via painel externo
        window.addEventListener('message', function(e) {
            const d = e.data;
            if (!d || d.type !== 'pm-update') return;
            if (d.campo === 'avatar' && d.valor) document.getElementById('pm-avatar').src = d.valor;
            if (d.campo === 'nome' && d.valor !== undefined) document.getElementById('pm-nome').textContent = d.valor;
            if (d.campo === 'subtitulo' && d.valor !== undefined) document.getElementById('pm-subtitulo').textContent = d.valor;
            if (d.campo === 'bio' && d.valor !== undefined) document.getElementById('pm-bio').textContent = d.valor;
            if (d.campo === 'link-texto') { const el = document.getElementById('pm-link-' + d.index + '-texto'); if (el) el.textContent = d.valor; }
            if (d.campo === 'link-href') { const el = document.getElementById('pm-link-' + d.index); if (el) el.href = d.valor || '#'; }
            if (d.campo === 'link-icon') {
                const el = document.getElementById('pm-link-' + d.index + '-icon');
                if (el) { el.setAttribute('data-lucide', d.valor); lucide.createIcons(); }
            }
            if (d.campo === 'mini-texto') { const el = document.getElementById('pm-mini-' + d.index + '-texto'); if (el) el.textContent = d.valor; }
            if (d.campo === 'mini-href') { const el = document.getElementById('pm-mini-' + d.index); if (el) el.href = d.valor || '#'; }
            if (d.campo === 'mini-icon') {
                const el = document.getElementById('pm-mini-' + d.index + '-icon');
                if (el) { el.setAttribute('data-lucide', d.valor); lucide.createIcons(); }
            }
        });

        // Animação de entrada em cascata
        document.addEventListener("DOMContentLoaded", () => {
            const elements = document.querySelectorAll('.reveal-up');
            
            elements.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('active');
                }, 100 * index); 
            });
            
            initMagicDust();
        });

        // Efeito de Poeira Mágica / Estrelas Frias (Flutuando para cima)
        function initMagicDust() {
            const canvas = document.getElementById('magic-dust');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            window.addEventListener('resize', resize);
            resize();

            class DustParticle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 1.5 + 0.5; // Tamanhos bem pequenos
                    this.speedY = -(Math.random() * 0.3 + 0.1); // Sobem lentamente
                    this.speedX = (Math.random() - 0.5) * 0.2; // Balanço horizontal
                    // Cores alternando entre ciano clarinho e branco
                    this.color = Math.random() > 0.5 ? 'rgba(0, 245, 212, 0.4)' : 'rgba(255, 255, 255, 0.3)';
                }
                
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;

                    // Se sair pelo topo, volta para baixo
                    if (this.y < 0) {
                        this.y = height;
                        this.x = Math.random() * width;
                    }
                }
                
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Cria 70 partículas
            for (let i = 0; i < 70; i++) {
                particles.push(new DustParticle());
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }

            animate();
        }
    </script>
</body>
</html>
